version: "3.8"

services:
  edwinpai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edwinpai
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - EDWINPAI_HOME=/data
    volumes:
      - edwinpai-data:/data
      - ./config.yaml:/data/config.yaml:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  edwinpai-data:
