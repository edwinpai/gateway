services:
  - type: web
    name: edwinpai
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: EDWINPAI_STATE_DIR
        value: /data/.edwinpai
      - key: EDWINPAI_WORKSPACE_DIR
        value: /data/workspace
      - key: EDWINPAI_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: edwinpai-data
      mountPath: /data
      sizeGB: 1
