name: memory-consolidation
description: "Dreamer pattern — consolidate episodic memories into semantic knowledge"

steps:
  # Step 1: Run dreamer script (direct LLM call, no Shad overhead)
  # Reads recent daily notes, calls Claude for synthesis, writes semantic files
  - id: dream
    exec: |
      bash ~/.edwinpai/workspace/workflows/dreamer.sh
    timeout: 180s

  # Step 2: Re-index and embed the new/updated files
  - id: reindex
    exec: |
      export QMD_OPENAI=1
      unset OPENAI_API_KEY
      qmd update -c workspace 2>&1
      qmd embed -c workspace 2>&1
    timeout: 120s
