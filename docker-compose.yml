services:
  edwinpai-gateway:
    image: ${EDWINPAI_IMAGE:-edwinpai:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      EDWINPAI_GATEWAY_TOKEN: ${EDWINPAI_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${EDWINPAI_CONFIG_DIR}:/home/node/.edwinpai
      - ${EDWINPAI_WORKSPACE_DIR}:/home/node/.edwinpai/workspace
    ports:
      - "${EDWINPAI_GATEWAY_PORT:-18789}:18789"
      - "${EDWINPAI_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${EDWINPAI_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  edwinpai-cli:
    image: ${EDWINPAI_IMAGE:-edwinpai:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      EDWINPAI_GATEWAY_TOKEN: ${EDWINPAI_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${EDWINPAI_CONFIG_DIR}:/home/node/.edwinpai
      - ${EDWINPAI_WORKSPACE_DIR}:/home/node/.edwinpai/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
